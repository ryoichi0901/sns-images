name: FX Analysis
on:
  schedule:
    - cron: "0 22 * * *"
    - cron: "0 6 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fx-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests python-dotenv anthropic yfinance
      - name: FX分析実行
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          DISCORD_WEBHOOK_FX: ${{ secrets.DISCORD_WEBHOOK_FX }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fx_analysis.py
      - name: ログ記録
        if: always()
        run: |
          mkdir -p logs
          python -c "
          import json
          from datetime import datetime, timezone, timedelta
          JST = timezone(timedelta(hours=9))
          status = 'success' if '${{ job.status }}' != 'failure' else 'failure'
          with open('logs/fx_analysis_last_run.json','w') as f:
              json.dump({'last_run': datetime.now(JST).isoformat(), 'status': status}, f)
          "
      - uses: stefanzweifel/git-auto-commit-action@v5
        if: always()
        with:
          commit_message: "chore: fx log"
          file_pattern: "logs/*.json"
