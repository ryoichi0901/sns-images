name: SNS Auto Post

on:
  schedule:
    - cron: '0 22 * * *'  # 7:00 JST Threadsのみ
    - cron: '0 3 * * *'   # 12:00 JST Threadsのみ
    - cron: '0 12 * * *'  # 21:00 JST Instagram+Threads
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Claude Code Agent
        uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash"
          model: "claude-opus-4-5"
          prompt: |
          あなたは「金融×AI副業」専門のSNS投稿エージェントです。以下のステップを順番に実行してください。

            ## Step 1: 投稿型を選定
            以下の型から時間帯に合わせて1つ選ぶ：
            - 共感型・暴露型・数字型・行動型・トレンド型

            ## Step 2: 投稿文を生成
            - 冒頭は共感フレーズ
            - 元銀行員視点の数字・事実を1つ
            - 具体的な行動提案（3分でできること）
            - コメントを促す問いかけで締める
            - 絵文字2〜3個、ハッシュタグ5個（#AI副業 #資産形成 #副業収入 #金融リテラシー必須）

            ## Step 3: 自己採点
            100点満点で採点。70点未満なら再生成。

            ## Step 4: 投稿実行
            python scripts/post.py を実行して結果を報告する。
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ secrets.GH_REPO }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
