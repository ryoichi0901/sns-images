name: SNS Auto Post
on:
  schedule:
    - cron: "30 22 * * *"
    - cron: "0 3 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "morning / noon / evening"
        default: "morning"
      dry_run:
        description: "true / false"
        default: "false"
jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests python-dotenv anthropic pillow
      - name: スロット判定
        id: slot
        run: |
          HOUR=$(TZ=Asia/Tokyo date +%H)
          INPUT="${{ github.event.inputs.slot }}"
          if [ -n "$INPUT" ]; then
            echo "slot=$INPUT" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -ge 7 ] && [ "$HOUR" -lt 11 ]; then
            echo "slot=morning" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -ge 11 ] && [ "$HOUR" -lt 16 ]; then
            echo "slot=noon" >> $GITHUB_OUTPUT
          else
            echo "slot=evening" >> $GITHUB_OUTPUT
          fi
      - name: 投稿実行
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/post.py --slot ${{ steps.slot.outputs.slot }}
      - name: ログ記録
        if: always()
        run: |
          python -c "
          import json,os
          from datetime import datetime,timezone,timedelta
          JST=timezone(timedelta(hours=9))
          slot='${{ steps.slot.outputs.slot }}'
          s='success' if '${{ job.status }}'!='failure' else 'failure'
          import pathlib
          p=pathlib.Path(f'logs/post_{slot}_last_run.json')
          p.parent.mkdir(exist_ok=True)
          p.write_text(json.dumps({'last_run':datetime.now(JST).isoformat(),'status':s}))
          "
      - uses: stefanzweifel/git-auto-commit-action@v5
        if: always()
        with:
          commit_message: "chore: post log"
          file_pattern: "logs/*.json"
      - name: 失敗通知
        if: failure()
        env:
          DISCORD_WEBHOOK_HEALTH: ${{ secrets.DISCORD_WEBHOOK_HEALTH }}
        run: |
          python -c "
          import os,requests
          w=os.getenv('DISCORD_WEBHOOK_HEALTH')
          if w: requests.post(w,json={'content':'❌ SNS投稿失敗[${{ steps.slot.outputs.slot }}]'},timeout=10)
          "
