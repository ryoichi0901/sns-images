name: SNS Auto Post

on:
  schedule:
    - cron: '0 22 * * *'   # 07:00 JST  Threads テキストのみ
    - cron: '0 3 * * *'    # 12:00 JST  Threads テキストのみ
    - cron: '0 12 * * *'   # 21:00 JST  Instagram + Threads + Reels（Pillow+FFmpeg）
  workflow_dispatch:
    inputs:
      mode:
        description: 'threads-only または full（Instagram + Threads + Reels）'
        required: false
        default: 'threads-only'

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          # FFmpeg は ubuntu-latest に標準搭載済み
          # Pillow での日本語テキスト描画に使用するフォント
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Determine post mode
        id: mode
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          DISPATCH="${{ github.event.inputs.mode }}"

          if [ "$SCHEDULE" = "0 12 * * *" ] || [ "$DISPATCH" = "full" ]; then
            echo "cmd=python3 scripts/run.py --platforms ig th --reels" >> $GITHUB_OUTPUT
            echo "label=21:00 フル投稿（Instagram + Threads + Reels）" >> $GITHUB_OUTPUT
          else
            echo "cmd=python3 scripts/run.py --platforms th" >> $GITHUB_OUTPUT
            echo "label=Threads テキストのみ" >> $GITHUB_OUTPUT
          fi

      - name: Run post
        run: |
          echo "▶ ${{ steps.mode.outputs.label }}"
          ${{ steps.mode.outputs.cmd }}
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDINARY_CLOUD_NAME:  ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:     ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:  ${{ secrets.CLOUDINARY_API_SECRET }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID:  ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          THREADS_ACCESS_TOKEN:   ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:        ${{ secrets.THREADS_USER_ID }}
