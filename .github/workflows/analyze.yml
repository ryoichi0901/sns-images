name: SNS Analyze

on:
  schedule:
    - cron: '0 20 */2 * *'   # 2日に1回 翌朝05:00 JST（UTC 20:00）
  workflow_dispatch: {}       # 手動実行

jobs:
  buzz-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run buzz analysis
        run: python3 scripts/analyze_buzz.py
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}

      - name: Commit buzz analysis
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/buzz_analysis.json
          if git diff --cached --quiet; then
            echo "変更なし: コミットをスキップします"
          else
            git commit -m "chore: buzz analysis $(date -u +%Y-%m-%d)"
            git push
          fi

  self-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run self-account analysis
        run: python3 scripts/analyze_self.py
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID:  ${{ secrets.INSTAGRAM_BUSINESS_ID }}

      - name: Notify Slack on completion
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"${EMOJI} 自アカウント分析 ${STATUS} — $(date -u '+%Y-%m-%d %H:%M UTC')\"}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Commit self analysis
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/self_analysis.json
          if git diff --cached --quiet; then
            echo "変更なし: コミットをスキップします"
          else
            git commit -m "chore: self analysis $(date -u +%Y-%m-%d)"
            git push
          fi
