name: Discord Daily Notification

on:
  schedule:
    - cron: '0 0 * * *'    # JST 09:00
    - cron: '0 12 * * *'   # JST 21:00
  workflow_dispatch:

jobs:
  instagram-likes:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install python-dotenv requests
      - name: 競合リスト更新
        run: python update_competitors.py
      - name: いいね候補送信
        env:
          DISCORD_WEBHOOK_INSTAGRAM: ${{ secrets.DISCORD_WEBHOOK_INSTAGRAM }}
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
        run: python instagram_likes.py

  utage-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install python-dotenv requests playwright
      - run: playwright install chromium --with-deps
      - name: UTAGEスケジュール
        env:
          UTAGE_EMAIL: ${{ secrets.UTAGE_EMAIL }}
          UTAGE_PASSWORD: ${{ secrets.UTAGE_PASSWORD }}
          DISCORD_WEBHOOK_UTAGE: ${{ secrets.DISCORD_WEBHOOK_UTAGE }}
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
        run: python3 utage_schedule.py
      - name: ログイン失敗時スクリーンショット保存
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: utage-login-failure-${{ github.run_id }}
          path: utage_login_failure.png
          if-no-files-found: ignore
          retention-days: 7
