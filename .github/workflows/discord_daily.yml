name: Discord Daily Notification

on:
  schedule:
    - cron: '0 6 * * *'    # JST 15:00
    - cron: '0 13 * * *'   # JST 22:00
    - cron: '0 23 * * *'   # JST 08:00
    - cron: '0 12 * * *'   # JST 21:00
  workflow_dispatch:

jobs:
  fx-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic yfinance python-dotenv requests
      - name: FX分析
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_FX: ${{ secrets.DISCORD_WEBHOOK_FX }}
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
        run: python fx_analysis.py

  instagram-likes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install python-dotenv requests
      - name: 競合リスト更新
        run: python update_competitors.py
      - name: いいね候補送信
        env:
          DISCORD_WEBHOOK_INSTAGRAM: ${{ secrets.DISCORD_WEBHOOK_INSTAGRAM }}
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
        run: python instagram_likes.py

  utage-schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install python-dotenv requests playwright
      - run: playwright install chromium --with-deps
      - name: UTAGEスケジュール
        env:
          UTAGE_EMAIL: ${{ secrets.UTAGE_EMAIL }}
          UTAGE_PASSWORD: ${{ secrets.UTAGE_PASSWORD }}
          DISCORD_WEBHOOK_UTAGE: ${{ secrets.DISCORD_WEBHOOK_UTAGE }}
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
        run: python3 utage_schedule.py
